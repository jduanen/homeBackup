# Backup configuration for jdnLinux2.local
# This machine hosts the backup drive — backs up to itself via localhost SSH.
# Sourced by backup.sh — bash syntax throughout

BACKUP_USER="jdn"
BACKUP_HOST="localhost"
BACKUP_BASE="/media/jdn/Elements"
BACKUP_SSH_KEY="/home/jdn/.ssh/id_ed25519_backup_jdnLinux2"
BACKUP_PORT=22
SNAPSHOT_KEEP_DAYS=30

# Drive lifecycle management (only set on the machine that physically holds the drive).
# install.sh uses this to install the mount/unmount timers and udev automount-block rule.
BACKUP_DRIVE_LABEL="Elements"

BACKUP_SOURCES=(
    "/home/jdn/.gitconfig"
    "/home/jdn/.ssh/"
    "/home/jdn/Code/"
    "/home/jdn/Desktop/"
    "/home/jdn/Documents/"
    "/home/jdn/Pictures/"
    "/home/jdn/txt/"
    "/home/jdn/Videos/"
    "/etc/"
)

BACKUP_EXCLUDES=(
    ".git/"
    "__pycache__/"
    "*.pyc"
    ".venv/"
    "venv/"
    "node_modules/"
    ".cache/"
    "*.egg-info/"
    ".virtualenvs/"
    ".cargo/"
    "snap/"
    "*.tmp"
    ".rsync-partial/"
    "*.iso"
    "ufw/"
    # /etc files not readable by jdn (root-only by design)
    "shadow"
    "shadow-"
    "gshadow"
    "gshadow-"
    "ssl/private/"
    "ssh/ssh_host_*_key"
)
